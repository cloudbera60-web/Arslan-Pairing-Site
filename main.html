<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mercedes | Connection Portal</title>
  <link rel="shortcut icon" type="x-icon" href="https://files.catbox.moe/oifwcm.jpg">
  <meta property="og:image" content="https://files.catbox.moe/oifwcm.jpg">
  <meta property="og:title" content="Mercedes Connection Portal">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold: #d4aa3c;
      --gold-light: #f0d060;
      --gold-dark: #c89820;
      --dark: #0a0a0f;
      --darker: #06060b;
      --card: rgba(13,13,20,0.88);
      --text: #e0e0f0;
      --text-muted: #6b6b8a;
    }

    body {
      background: var(--darker);
      font-family: 'Rajdhani', sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      position: relative;
    }

    /* Grid background */
    .grid-bg {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(212,170,60,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(212,170,60,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* Radial glow */
    .radial-glow {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: radial-gradient(ellipse 80% 55% at 50% 25%, rgba(212,170,60,0.07) 0%, transparent 70%);
    }

    /* Particles */
    .particle {
      position: fixed; width: 3px; height: 3px;
      background: rgba(212,170,60,0.5); border-radius: 50%;
      pointer-events: none; z-index: 0;
      animation: particleFloat linear infinite;
    }
    @keyframes particleFloat {
      0%   { transform: translate(0,0);      opacity: 0.3; }
      50%  { opacity: 0.7; }
      100% { transform: translate(180px,-180px); opacity: 0.3; }
    }

    /* Card */
    .card {
      position: relative; z-index: 1;
      width: min(92%, 480px);
      background: var(--card);
      border: 1px solid rgba(212,170,60,0.2);
      border-radius: 20px;
      backdrop-filter: blur(20px);
      box-shadow: 0 0 40px rgba(212,170,60,0.07), 0 24px 64px rgba(0,0,0,0.55), inset 0 1px 0 rgba(212,170,60,0.1);
      padding: 2.5rem 2rem;
      margin: 2rem 0;
    }

    /* Corner accents */
    .card::before, .card::after,
    .card-inner::before, .card-inner::after {
      content: ''; position: absolute; width: 18px; height: 18px;
      border-color: rgba(212,170,60,0.45);
    }
    .card::before  { top:10px; left:10px;  border-top:2px solid; border-left:2px solid;  border-radius: 4px 0 0 0; }
    .card::after   { top:10px; right:10px; border-top:2px solid; border-right:2px solid; border-radius: 0 4px 0 0; }
    .card-inner::before { bottom:10px; left:10px;  border-bottom:2px solid; border-left:2px solid;  border-radius: 0 0 0 4px; }
    .card-inner::after  { bottom:10px; right:10px; border-bottom:2px solid; border-right:2px solid; border-radius: 0 0 4px 0; }
    .card-inner { position: relative; }

    /* Logo */
    .logo-wrap {
      display: flex; flex-direction: column; align-items: center;
      margin-bottom: 1.5rem;
    }
    .logo-ring {
      position: relative; width: 96px; height: 96px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 1rem;
    }
    .logo-ring::before {
      content: '';
      position: absolute; inset: 0; border-radius: 50%;
      border: 2px solid rgba(212,170,60,0.25);
      animation: spinRing 20s linear infinite;
    }
    @keyframes spinRing { to { transform: rotate(360deg); } }
    .logo-ring::after {
      content: '';
      position: absolute; inset: -8px; border-radius: 50%;
      border: 1px solid rgba(212,170,60,0.1);
      animation: pingPulse 3s ease-in-out infinite;
    }
    @keyframes pingPulse {
      0%,100% { opacity: 0.3; transform: scale(1); }
      50%      { opacity: 0.0; transform: scale(1.12); }
    }
    .logo-circle {
      width: 80px; height: 80px; border-radius: 50%;
      background: linear-gradient(135deg, #d4aa3c 0%, #f0d060 45%, #c89820 100%);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 28px rgba(212,170,60,0.5), 0 0 60px rgba(212,170,60,0.18), 0 6px 20px rgba(0,0,0,0.4);
    }
    .logo-circle svg { width: 54px; height: 54px; }

    /* Gold shimmer text */
    .gold-text {
      background: linear-gradient(135deg, #d4aa3c 0%, #f0d060 30%, #c89820 60%, #e8c840 100%);
      background-size: 200% auto;
      -webkit-background-clip: text; background-clip: text; color: transparent;
      animation: shimmer 4s linear infinite;
    }
    @keyframes shimmer { to { background-position: 200% center; } }

    .label {
      font-size: 0.68rem; font-weight: 600; letter-spacing: 0.28em;
      text-transform: uppercase; color: rgba(212,170,60,0.55);
      margin-bottom: 0.3rem;
    }
    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 2.4rem; font-weight: 900; letter-spacing: 0.06em;
      line-height: 1; margin-bottom: 0.35rem;
    }
    .subtitle {
      font-size: 0.9rem; color: var(--text-muted); letter-spacing: 0.04em;
      margin-bottom: 2rem;
    }

    /* Info grid */
    .info-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 0.65rem; margin-bottom: 1.8rem;
    }
    .info-tile {
      background: rgba(212,170,60,0.04);
      border: 1px solid rgba(212,170,60,0.1);
      border-radius: 14px; padding: 0.85rem;
    }
    .info-tile .icon { font-size: 1.2rem; margin-bottom: 0.3rem; }
    .info-tile .key  { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.18em; color: var(--text-muted); }
    .info-tile .val  { font-size: 0.9rem; font-weight: 700; color: rgba(240,208,96,0.9); }

    /* Feature rows */
    .feature-list { display: flex; flex-direction: column; gap: 0.65rem; margin-bottom: 1.8rem; }
    .feature-row {
      display: flex; align-items: center; gap: 0.85rem;
      background: rgba(212,170,60,0.04); border: 1px solid rgba(212,170,60,0.1);
      border-radius: 14px; padding: 0.8rem 1rem;
    }
    .feature-row .ficon { font-size: 1.4rem; flex-shrink: 0; }
    .feature-row .ftitle { font-size: 0.95rem; font-weight: 700; color: rgba(240,208,96,0.9); }
    .feature-row .fdesc  { font-size: 0.78rem; color: var(--text-muted); }

    /* Buttons */
    .btn-primary, .btn-secondary {
      display: block; width: 100%; padding: 1rem;
      border-radius: 14px; font-family: 'Orbitron', sans-serif;
      font-size: 0.78rem; font-weight: 700; letter-spacing: 0.18em;
      text-transform: uppercase; text-align: center; text-decoration: none;
      border: none; cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #d4aa3c 0%, #f0d060 50%, #c89820 100%);
      color: #08080e;
      box-shadow: 0 4px 20px rgba(212,170,60,0.32), 0 2px 6px rgba(0,0,0,0.3);
      margin-bottom: 0.75rem;
    }
    .btn-secondary {
      background: rgba(212,170,60,0.07);
      border: 1px solid rgba(212,170,60,0.28);
      color: #d4aa3c;
    }
    .btn-primary:hover  { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(212,170,60,0.42); }
    .btn-secondary:hover{ transform: translateY(-2px); background: rgba(212,170,60,0.12); }
    .btn-primary:active, .btn-secondary:active { transform: translateY(0); }

    /* Footer */
    .footer { position: relative; z-index: 1; text-align: center; margin-top: 1.5rem; margin-bottom: 1rem; }
    .footer .by { font-size: 0.72rem; color: var(--text-muted); margin-bottom: 0.2rem; }
    .footer .brand { font-family: 'Orbitron', sans-serif; font-size: 0.75rem; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase; }

    /* Fade in */
    .fade-in { animation: fadeUp 0.6s ease-out both; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:none; } }
  </style>
</head>
<body>

  <div class="grid-bg"></div>
  <div class="radial-glow"></div>

  <!-- Particles -->
  <div class="particle" style="top:14%;left:7%;animation-duration:22s;animation-delay:0s"></div>
  <div class="particle" style="top:68%;left:13%;animation-duration:28s;animation-delay:3s"></div>
  <div class="particle" style="top:38%;left:87%;animation-duration:20s;animation-delay:5s"></div>
  <div class="particle" style="top:78%;left:90%;animation-duration:25s;animation-delay:1s"></div>
  <div class="particle" style="top:8%;left:54%;animation-duration:32s;animation-delay:4s"></div>
  <div class="particle" style="top:55%;left:2%;animation-duration:18s;animation-delay:2s"></div>

  <div class="card fade-in">
    <div class="card-inner">
      <div class="logo-wrap">
        <div class="logo-ring">
          <div class="logo-circle">
            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="50" cy="50" r="47" stroke="rgba(0,0,0,0.18)" stroke-width="2" fill="none"/>
              <line x1="50" y1="5"  x2="50" y2="50" stroke="rgba(15,10,3,0.88)" stroke-width="4.5" stroke-linecap="round"/>
              <line x1="50" y1="50" x2="7"  y2="74" stroke="rgba(15,10,3,0.88)" stroke-width="4.5" stroke-linecap="round"/>
              <line x1="50" y1="50" x2="93" y2="74" stroke="rgba(15,10,3,0.88)" stroke-width="4.5" stroke-linecap="round"/>
              <circle cx="50" cy="50" r="5" fill="rgba(15,10,3,0.88)"/>
            </svg>
          </div>
        </div>
        <div class="label">Session Portal</div>
        <h1 class="gold-text">MERCEDES</h1>
        <p class="subtitle">WhatsApp Bot Connection Portal</p>
      </div>

      <div class="info-grid">
        <div class="info-tile"><div class="icon">🤖</div><div class="key">Bot Name</div><div class="val">Mercedes</div></div>
        <div class="info-tile"><div class="icon">🔒</div><div class="key">Security</div><div class="val">Encrypted</div></div>
        <div class="info-tile"><div class="icon">⚡</div><div class="key">Version</div><div class="val">V2 Ultra</div></div>
        <div class="info-tile"><div class="icon">🌐</div><div class="key">Status</div><div class="val">Online</div></div>
      </div>

      <div class="feature-list">
        <div class="feature-row">
          <span class="ficon">🔑</span>
          <div>
            <div class="ftitle">Pair Code</div>
            <div class="fdesc">Connect using an 8-digit pairing code</div>
          </div>
        </div>
        <div class="feature-row">
          <span class="ficon">📷</span>
          <div>
            <div class="ftitle">QR Code</div>
            <div class="fdesc">Scan with WhatsApp to link your device</div>
          </div>
        </div>
      </div>

      <a href="/pair" class="btn-primary">⚡ Get Pair Code</a>
      <a href="/qr"   class="btn-secondary">📷 Scan QR Code</a>
    </div>
  </div>

  <div class="footer fade-in" style="animation-delay:0.2s">
    <p class="by">Powered by</p>
    <p class="brand gold-text">Mercedes Bot System</p>
  </div>

</body>
</html>
